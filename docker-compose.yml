# ResearchClaw Experiment Environment
# Usage: docker compose up

services:
  experiment:
    image: researchclaw/experiment:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    volumes:
      # Project code and datasets - mounted automatically
      - /home/fj/RT-DETR:/workspace/RT-DETR
      - /home/fj/dinov3:/workspace/dinov3
      - /home/fj/datasets:/workspace/datasets
      # Docker socket for nested containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Working directory
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Optional: run specific command
    # command: bash
